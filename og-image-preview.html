<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Graph Image Preview</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .preview-container {
      border: 1px solid #333;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      background-color: #000;
      display: flex;
      max-width: 1200px;
      max-height: 1200px;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <img src="src/app/opengraph-image.png" alt="Static Open Graph Image Preview">
  </div>
</body>
</html>
